<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auto Attendance Fetcher</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #6dd5ed, #2193b0);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 320px;
      text-align: center;
    }
    .card h2 {
      margin-bottom: 20px;
      color: #333;
    }
    .input-group {
      position: relative;
      margin: 10px 0;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      padding-right: 40px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      outline: none;
    }
    input:focus {
      border-color: #007bff;
    }
    .toggle-eye {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 16px;
      color: #888;
    }
    button {
      padding: 12px;
      width: 100%;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background-color: #0056b3;
    }
    #loading {
      display: none;
      text-align: center;
    }
    .spinner {
      margin: 20px auto;
      width: 40px;
      height: 40px;
      border: 5px solid #ddd;
      border-top: 5px solid #007bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .progress {
      width: 100%;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }
    .progress-bar {
      height: 10px;
      width: 0%;
      background: #007bff;
      transition: width 0.3s ease-in-out;
    }
    .percentage {
      margin-top: 8px;
      font-weight: bold;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="card" id="loginForm">
    <h2>📘 ECAP Attendance</h2>
    <div class="input-group">
      <input type="text" id="username" placeholder="Roll Number" />
    </div>
    <div class="input-group">
      <input type="password" id="password" placeholder="ECAP Student Password" />
      <span class="toggle-eye" onclick="togglePassword()">👁️</span>
    </div>
    <button onclick="saveCredentials()">Submit</button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p>Fetching your Attendance, please wait...</p>
    <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="percentage" id="percentage">0%</div>
  </div>

  <script>
    const savedUser = localStorage.getItem("ecap_user");
    const savedPass = localStorage.getItem("ecap_pass");

    if (savedUser && savedPass) {
      showLoading();
      startProgress();
      fetch("/register", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ username: savedUser, password: savedPass }),
})
.then(res => res.text())
.then(html => {
  document.open();
  document.write(html);
  document.close();
});

    }

    function saveCredentials() {
      const u = document.getElementById("username").value.trim();
      const p = document.getElementById("password").value.trim();
      if (!u || !p) return alert("⚠️ Please enter both Roll number and password.");

      localStorage.setItem("ecap_user", u);
      localStorage.setItem("ecap_pass", p);

      showLoading();
      startProgress();
      window.location.href = `/register?username=${u}&password=${p}`;
    }

    function showLoading() {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("loading").style.display = "block";
    }

    function startProgress() {
      const bar = document.getElementById("progress-bar");
      const percent = document.getElementById("percentage");
      let progress = 0;
      const interval = setInterval(() => {
        if (progress >= 99) return clearInterval(interval);
        progress += Math.random() * 5;
        progress = Math.min(progress, 99);
        bar.style.width = `${progress.toFixed(0)}%`;
        percent.innerText = `${progress.toFixed(0)}%`;
      }, 300);
    }

    function togglePassword() {
      const pwd = document.getElementById("password");
      pwd.type = pwd.type === "password" ? "text" : "password";
    }
  </script>
</body>
</html>
