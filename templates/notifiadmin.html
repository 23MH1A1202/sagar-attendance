<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagar Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .admin-card {
            background: #1e293b;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 { margin-top: 0; color: #6366f1; font-weight: 800; text-align: center; }
        label { display: block; font-size: 0.8rem; font-weight: 700; color: #94a3b8; margin-bottom: 0.5rem; text-transform: uppercase; }
        input, textarea, select {
            width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #334155;
            background: #0f172a; color: white; font-family: inherit; margin-bottom: 1.5rem;
            box-sizing: border-box; outline: none;
        }
        input:focus, textarea:focus, select:focus { border-color: #6366f1; }
        textarea { resize: vertical; min-height: 100px; }
        button {
            width: 100%; padding: 1rem; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white;
            font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s;
        }
        button:active { transform: scale(0.95); }
        .flex-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .flex-row select { margin-bottom: 0; flex: 1; }
        .flex-row button { width: auto; padding: 0.8rem; font-size: 0.85rem; background: #334155; }
        #status { text-align: center; font-size: 0.85rem; font-weight: bold; margin-top: 1rem; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h2>Admin Broadcast 📢</h2>
        
        <label>Admin Password</label>
        <input type="password" id="adminSecret" placeholder="Enter secret key...">
        
        <label>Target User</label>
        <div class="flex-row">
            <select id="targetUser">
                <option value="ALL">📢 All Active Users (Broadcast)</option>
            </select>
            <button onclick="loadUsers()" id="loadBtn">Load Users</button>
        </div>

        <label>Custom Message</label>
        <textarea id="customMessage" placeholder="Type your testing message here..."></textarea>
        
        <button onclick="sendBroadcast()" id="sendBtn">Send Push Notification</button>
        <div id="status"></div>
    </div>

    <script>
        async function loadUsers() {
            const secret = document.getElementById('adminSecret').value;
            const statusEl = document.getElementById('status');
            const loadBtn = document.getElementById('loadBtn');
            const selectEl = document.getElementById('targetUser');

            if (!secret) {
                statusEl.innerText = "⚠️ Enter password first to load users.";
                statusEl.style.color = "#fb7185";
                return;
            }

            loadBtn.innerText = "...";
            try {
                const res = await fetch('/api/admin/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret })
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                // Clear and rebuild options
                selectEl.innerHTML = '<option value="ALL">📢 All Active Users (Broadcast)</option>';
                data.users.forEach(u => {
                    const opt = document.createElement('option');
                    opt.value = u.rollNo;
                    // Format: "23MH1A1202 - Sagar"
                    opt.innerText = `👤 ${u.rollNo} - ${u.name ? u.name.split(' ')[0] : 'Unknown'}`;
                    selectEl.appendChild(opt);
                });

                statusEl.innerText = `✅ Loaded ${data.users.length} active users.`;
                statusEl.style.color = "#34d399";
            } catch (err) {
                statusEl.innerText = `❌ Error: ${err.message}`;
                statusEl.style.color = "#fb7185";
            } finally {
                loadBtn.innerText = "Load Users";
            }
        }

        async function sendBroadcast() {
            const secret = document.getElementById('adminSecret').value;
            const message = document.getElementById('customMessage').value;
            const targetRollNo = document.getElementById('targetUser').value;
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('sendBtn');

            if (!secret || !message) {
                statusEl.innerText = "⚠️ Please fill all fields.";
                statusEl.style.color = "#fb7185";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sending...";
            statusEl.innerText = "";

            try {
                const res = await fetch('/api/admin/broadcast', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret, message, targetRollNo })
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Failed to send");

                statusEl.innerText = `✅ Success! Sent to ${data.sentCount} device(s).`;
                statusEl.style.color = "#34d399";
                document.getElementById('customMessage').value = "";
            } catch (err) {
                statusEl.innerText = `❌ Error: ${err.message}`;
                statusEl.style.color = "#fb7185";
            } finally {
                btn.disabled = false;
                btn.innerText = "Send Push Notification";
            }
        }
    </script>
</body>
</html>
